name: Sync social updates

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync latest updates
        env:
          SOCIAL_UPDATES_LIMIT: 6
          SOCIAL_INCLUDE_REPOSTS: false
          SOCIAL_GRAPH_API_VERSION: ${{ secrets.SOCIAL_GRAPH_API_VERSION }}
          SOCIAL_FALLBACK_IMAGE: /images/img1.jpeg
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          LINKEDIN_ORGANIZATION_ID: ${{ secrets.LINKEDIN_ORGANIZATION_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_API_VERSION: ${{ secrets.LINKEDIN_API_VERSION }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: npm run sync:updates

      - name: Commit updated cache
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync latest social updates"
          file_pattern: public/data/latest-updates.json
